<form [formGroup]="mainForm" class="grid grid-cols-12 gap-x-4 gap-y-6">
  <div class="col-span-12 lg:col-span-7">
    <div class="grid grid-cols-12 gap-x-4 gap-y-6">
      <div class="col-span-12">
        <form-title title="notifications.label" description="notifications.description"></form-title>
      </div>

      <div class="col-span-12">
        <div class="flex items-center justify-between gap-4">
          <div class="flex flex-col gap-1">
            <span class="font-medium">{{ 'notifications.notificationsEnabled.label' | translate }}</span>
            <span class="text-sm text-muted-color">{{ 'notifications.notificationsEnabled.description' | translate }}</span>
          </div>
          <p-toggle-switch formControlName="notificationsEnabled" />
        </div>
      </div>

      <div class="col-span-12">
        <div class="flex items-center justify-between gap-4">
          <div class="flex flex-col gap-1">
            <span class="font-medium">{{ 'notifications.emailNotifications.label' | translate }}</span>
            <span class="text-sm text-muted-color">{{ 'notifications.emailNotifications.description' | translate }}</span>
          </div>
          <p-toggle-switch formControlName="emailNotifications" />
        </div>
      </div>

      <div class="col-span-12">
        <form-title title="timezone.label" description="timezone.description" class="mt-6"></form-title>
      </div>

      <div class="col-span-12">
        <form-label for="timezone" label="timezone.label"></form-label>
        <p-select
          id="timezone"
          [options]="timezones"
          formControlName="timezone"
          optionLabel="name"
          optionValue="code"
          [placeholder]="'select.placeholder' | translate"
          fluid="true"
          size="large"
          appendTo="body"
        />
      </div>
    </div>
  </div>

  <div class="col-span-12 lg:col-span-5">
    <div class="flex justify-end">
      <p-button
        (onClick)="saveChanges()"
        [loading]="loading.update()"
        [disabled]="mainForm.invalid"
        [label]="'actions.saveChanges' | translate"
        icon="ph-bold ph-floppy-disk"
        iconPos="right"
        [raised]="true"
        size="large"
        fluid="true"
        styleClass="py-3! px-8!"
        class="w-full sm:w-auto"
      />
    </div>
  </div>
</form>
